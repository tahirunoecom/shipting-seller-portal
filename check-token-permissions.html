<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check WhatsApp Token Permissions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1a202c;
            margin-bottom: 32px;
        }
        .input-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }
        input:focus {
            outline: none;
            border-color: #4facfe;
        }
        button {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 4px 14px rgba(79, 172, 254, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 24px;
            padding: 20px;
            border-radius: 8px;
        }
        .result.success {
            background: #c6f6d5;
            border: 2px solid #38a169;
        }
        .result.error {
            background: #fed7d7;
            border: 2px solid #e53e3e;
        }
        .result.warning {
            background: #feebc8;
            border: 2px solid #dd6b20;
        }
        .permission-item {
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            background: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .permission-item.granted {
            border-left: 4px solid #38a169;
        }
        .permission-item.missing {
            border-left: 4px solid #e53e3e;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        pre {
            background: #2d3748;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 12px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Check Token Permissions</h1>

        <div class="input-group">
            <label>Meta App ID</label>
            <input type="text" id="appId" value="1559645705059315" placeholder="Your Meta App ID">
        </div>

        <div class="input-group">
            <label>Meta App Secret</label>
            <input type="password" id="appSecret" placeholder="Your Meta App Secret (get from Meta Developer Console)">
        </div>

        <div class="input-group">
            <label>WhatsApp Access Token</label>
            <input type="text" id="accessToken" value="EAAWKfVA5uZCMBQwmREZAu93O1ZBECdeoTjoW4k8xUkuXZCrBhbOPjZBwzZBRMyRuKSrSodgZBTlP8pK6wTCKrW05mPos67DrnxoJzoT4ICCLsVZAUyYtuetZBRzSZBf6qa36H0JRzVy6KrAQsMVUCMtvpMZCwZAf0laXwaFltqprBxtA9pZCiIla5keUASZCZCu1aWMLmssjDUSjPdnDxKQ3UNUJlKMArb5FZBxYuxTmzyBUZAOEg16SED4RBJq5Di91djr7IQKBLdHg0g40JfYKg4NgYTZAlxUSH3YzO6Yc5CdaOB" placeholder="Paste your WhatsApp access token">
        </div>

        <button onclick="checkPermissions()" id="checkBtn">
            🔍 Check Permissions
        </button>

        <div id="result"></div>
    </div>

    <script>
        async function checkPermissions() {
            const resultDiv = document.getElementById('result');
            const checkBtn = document.getElementById('checkBtn');
            const appId = document.getElementById('appId').value.trim();
            const appSecret = document.getElementById('appSecret').value.trim();
            const accessToken = document.getElementById('accessToken').value.trim();

            if (!appId || !appSecret || !accessToken) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <strong>❌ Error:</strong> Please fill in all fields
                    </div>
                `;
                return;
            }

            checkBtn.disabled = true;
            checkBtn.innerHTML = '<span class="loading"></span> Checking...';

            resultDiv.innerHTML = `
                <div class="result" style="background: #ebf8ff; border-color: #3182ce;">
                    <strong>⏳ Checking token permissions...</strong>
                </div>
            `;

            try {
                // Create app access token
                const appAccessToken = `${appId}|${appSecret}`;

                // Debug the token
                const response = await fetch(`https://graph.facebook.com/v21.0/debug_token?input_token=${accessToken}&access_token=${appAccessToken}`);

                const data = await response.json();

                if (response.ok && data.data) {
                    const tokenData = data.data;
                    const scopes = tokenData.scopes || [];

                    const requiredPermissions = [
                        'whatsapp_business_messaging',
                        'whatsapp_business_management',
                        'catalog_management',
                        'business_management'
                    ];

                    let html = `<div class="result success">`;
                    html += `<h3 style="margin-bottom: 16px; color: #22543d;">✅ Token is valid!</h3>`;

                    html += `<div style="margin-bottom: 16px;">`;
                    html += `<strong>Token Info:</strong><br>`;
                    html += `App ID: ${tokenData.app_id}<br>`;
                    html += `User ID: ${tokenData.user_id}<br>`;
                    html += `Expires: ${tokenData.expires_at ? new Date(tokenData.expires_at * 1000).toLocaleString() : 'Never'}<br>`;
                    html += `Valid: ${tokenData.is_valid ? 'Yes ✓' : 'No ✗'}<br>`;
                    html += `</div>`;

                    html += `<h4 style="margin-top: 20px; margin-bottom: 12px; color: #2d3748;">Permissions:</h4>`;

                    requiredPermissions.forEach(perm => {
                        const granted = scopes.includes(perm);
                        if (granted) {
                            html += `<div class="permission-item granted">`;
                            html += `<span style="color: #38a169; font-size: 20px;">✓</span>`;
                            html += `<strong style="color: #22543d;">${perm}</strong>`;
                            html += `</div>`;
                        } else {
                            html += `<div class="permission-item missing">`;
                            html += `<span style="color: #e53e3e; font-size: 20px;">✗</span>`;
                            html += `<strong style="color: #742a2a;">${perm} - MISSING!</strong>`;
                            html += `</div>`;
                        }
                    });

                    // Check if catalog_management is missing
                    if (!scopes.includes('catalog_management')) {
                        html += `</div>`;
                        html += `<div class="result error" style="margin-top: 20px;">`;
                        html += `<h3 style="color: #742a2a; margin-bottom: 12px;">❌ catalog_management is MISSING!</h3>`;
                        html += `<p style="margin-bottom: 12px;">This is why you're getting Error #200.</p>`;
                        html += `<p style="font-weight: 600; margin-bottom: 8px;">🔧 FIX:</p>`;
                        html += `<ol style="margin-left: 20px;">`;
                        html += `<li style="margin-bottom: 8px;">Go to your seller portal</li>`;
                        html += `<li style="margin-bottom: 8px;">Click "Disconnect WhatsApp"</li>`;
                        html += `<li style="margin-bottom: 8px;">Click "Connect with Facebook" again</li>`;
                        html += `<li style="margin-bottom: 8px;">New token will include catalog_management</li>`;
                        html += `</ol>`;
                        html += `<p style="margin-top: 16px; padding: 12px; background: #fff5f5; border-radius: 6px; border-left: 4px solid #e53e3e;">`;
                        html += `<strong>📖 See:</strong> Open <code>FIX-PERMISSION-ERROR.html</code> for step-by-step guide`;
                        html += `</p>`;
                    } else {
                        html += `<div style="margin-top: 20px; padding: 16px; background: #c6f6d5; border-radius: 6px;">`;
                        html += `<strong style="color: #22543d;">🎉 All required permissions are present!</strong><br>`;
                        html += `<span style="color: #276749;">You should be able to connect the catalog now.</span>`;
                        html += `</div>`;
                    }

                    html += `</div>`;

                    html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;

                    resultDiv.innerHTML = html;

                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            <strong>❌ Failed to check token</strong>
                            <p style="margin-top: 8px;">${data.error?.message || 'Unknown error'}</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                            <p style="margin-top: 16px; padding: 12px; background: #fff5f5; border-radius: 6px;">
                                <strong>💡 Tip:</strong> Make sure your App Secret is correct. Get it from:<br>
                                Meta Developer Console → Your App → Settings → Basic → App Secret
                            </p>
                        </div>
                    `;
                }

            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <strong>❌ Network Error</strong>
                        <p style="margin-top: 8px;">${error.message}</p>
                    </div>
                `;
            } finally {
                checkBtn.disabled = false;
                checkBtn.innerHTML = '🔍 Check Permissions';
            }
        }
    </script>
</body>
</html>
